<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David C. Y. Edwards — Links</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0A0A0A;
    --dark-mid: #141414;
    --dark-card: #1A1A1A;
    --text: #E8E0D0;
    --text-muted: #A09880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    background: radial-gradient(circle at 50% 0%, var(--dark-mid) 0%, var(--dark) 60%);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 2rem;
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--text-muted);
    font-size: 1.05rem;
    margin-bottom: 2.5rem;
    text-align: center;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin-bottom: 2.5rem;
  }

  .links {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    background: var(--dark-card);
    border: 1px solid rgba(201,168,76,0.15);
    border-top: 2px solid var(--gold);
    color: var(--text);
    text-decoration: none;
    padding: 1.1rem 1.4rem;
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .link-card:hover {
    background: #21201a;
    border-color: var(--gold);
    color: var(--gold-light);
    transform: translateY(-2px);
  }

  .link-card.featured {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: var(--dark);
    border-top: none;
    font-weight: 600;
  }

  .link-card.featured:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
  }

  .icon {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  footer {
    margin-top: 3rem;
    text-align: center;
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  footer a {
    color: var(--gold);
    text-decoration: none;
  }
</style>
</head>
